version: 2

before:
  hooks:
    - mise run build-frontend

builds:
  - main: ./cmd/otelop
    flags:
      - -tags=embed
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: darwin
        formats:
          - zip

changelog:
  disable: true

release:
  mode: keep-existing
